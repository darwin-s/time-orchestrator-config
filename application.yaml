spring:
  profiles:
    group:
      local:
        - "verbose"
      compose:
        - "verbose"
        - "db"
  jpa:
    hibernate:
      ddl-auto: validate
    generate-ddl: false

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: when_authorized
